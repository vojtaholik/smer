name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Run tests
        run: bun test

      - name: Check bundle
        run: bun run check

      - name: Run performance gate
        run: bun run benchmark

      - name: Build standalone binary
        run: bun run build

      - name: Check Homebrew formula syntax
        run: ruby -c Formula/smer.rb

      - name: Validate lat.md graph
        run: bunx lat.md@0.11.0 check
